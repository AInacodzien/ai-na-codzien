<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI-verktøy - Artikler</title>
  <link rel="icon" type="image/png" href="favicon_32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }
    :root {
      --bg-color: #0d1117;
      --text-color: #e6edf3;
      --accent-color: #00ffcc;
      --box-bg: #161b22;
      --border-color: #00ffcc;
      --section-bg: #12161d;
    }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      line-height: 1.6;
    }
    nav {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 1.5rem 3rem;
      background-color: rgba(13, 17, 23, 0.85);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0, 255, 204, 0.15);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
    }
    .nav-links {
      display: flex;
      gap: 3rem;
    }
    .nav-links a {
      font-size: 1.05rem;
      color: var(--accent-color);
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.3s;
      padding: 0.3rem 0.6rem;
      line-height: 1.2;
      display: block;
    }
    .nav-links a:hover {
      opacity: 0.8;
    }
    .burger {
      display: none;
      background: none;
      border: none;
      font-size: 1.5rem;
      color: var(--accent-color);
      cursor: pointer;
      z-index: 101;
    }
    @media (max-width: 768px) {
      .burger {
        display: block;
      }
      .nav-links {
        position: absolute;
        top: 100%;
        right: 2rem;
        background-color: var(--bg-color);
        border: 1px solid var(--border-color);
        border-radius: 6px;
        flex-direction: column;
        align-items: flex-end;
        padding: 0.5rem 1rem;
        opacity: 0;
        max-height: 0;
        overflow: hidden;
        transition: opacity 0.4s ease, max-height 0.4s ease;
        z-index: 99;
        width: auto;
        gap: 0.4rem;
      }
      .nav-links a {
        font-size: 1rem;
        padding: 0.3rem 0.5rem;
        line-height: 1.1;
      }
      .nav-links.active {
        opacity: 1;
        max-height: 300px;
      }
    }
    /* Header – identyczny styl jak w podstrona1,3,4 */
    header {
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),
                  url('ai-verktoy.png') center/cover no-repeat;
      background-attachment: fixed;
      color: white;
      text-align: center;
      padding: 8rem 2rem;
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      margin-bottom: 2rem;
    }
    header h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      color: var(--accent-color);
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem;
    }
    .article-list {
      list-style: none;
      padding: 0;
    }
    .article-item {
      background-color: var(--box-bg);
      border: 2px solid var(--border-color);
      padding: 1rem;
      margin-bottom: 1rem;
      border-radius: 8px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .article-item:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 15px rgba(0, 0, 0, 0.3);
    }
    .article-item a {
      color: var(--accent-color);
      text-decoration: none;
      font-weight: 600;
      font-size: 1.2rem;
    }
    .back-link {
      display: inline-block;
      margin: 1rem 0;
      color: var(--accent-color);
      text-decoration: none;
      font-weight: 600;
    }
    footer {
      text-align: center;
      padding: 2rem 1rem;
      background-color: #1f2937;
      color: #9ca3af;
    }
    footer nav {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 1rem;
    }
    footer nav a {
      color: var(--accent-color);
      text-decoration: none;
      font-weight: 600;
    }
    .footer-logo {
      display: block;
      margin: 1rem auto;
      max-width: 80px;
    }
  </style>
</head>
<body>
  <nav aria-label="Hovedmeny">
    <button class="burger" aria-label="Mobilmeny">
      <i class="fas fa-bars"></i>
    </button>
    <div class="nav-links">
      <a href="index.html">Hjem</a>
      <a href="blog.html">Blog</a>
      <a href="index.html#eksempler">Eksempler</a>
      <a href="index.html#kontakt">Kontakt</a>
    </div>
  </nav>

  <header>
    <h1>AI-verktøy</h1>
    <p>Oversikt over artikler om AI-verktøy</p>
  </header>

  <main class="container">
    <ul class="article-list">
      <li class="article-item">
         <a href="ai-verktoyA1.html">🔍 AI-verktøy: Sammenligning av populære språkmodeller (LLM)</a>
  </li>
      <li class="article-item">
        <a href="article2.html">Kommer snart</a>
      </li>
      <li class="article-item">
        <a href="article3.html">Kommer snart</a>
      </li>
    </ul>
    <a href="index.html" class="back-link">Tilbake til hjemmesiden</a>
  </main>

  <footer>
    <nav>
      <a href="index.html">Hjem</a>
      <a href="blog.html">Blog</a>
      <a href="index.html#eksempler">Eksempler</a>
      <a href="index.html#kontakt">Kontakt</a>
    </nav>
    <img src="edunso(14).png" alt="Kunstig intelligens i hverdagen logo" class="footer-logo">
    <p>&copy; 2025 AI-verktøy – Alle rettigheter forbeholdt.</p>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const burger = document.querySelector('.burger');
      const navLinks = document.querySelector('.nav-links');
      const links = document.querySelectorAll('.nav-links a');
      if (burger && navLinks) {
        burger.addEventListener('click', () => {
          navLinks.classList.toggle('active');
        });
        links.forEach(link => link.addEventListener('click', () => {
          navLinks.classList.remove('active');
        }));
      }
    });
  </script>
</body>
</html>
